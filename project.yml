name: Stripie
options:
  bundleIdPrefix: com.dushin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  StripeTerminal:
    url: https://github.com/stripe/stripe-terminal-ios
    minorVersion: 4.0.0

settings:
  base:
    # Apple Developer Team. Set here (not just in the generated .pbxproj) so it
    # survives `xcodegen generate` and Xcode stops re-prompting. Inherited by all
    # targets. Required for Xcode Cloud, which signs non-interactively.
    DEVELOPMENT_TEAM: 286LKF859M
    CODE_SIGN_STYLE: Automatic
    # Swift 5 language mode. Swift 6 mode enforces `sending`/region-isolation
    # checks that the Stripe Terminal v4 SDK (not concurrency-audited) cannot
    # satisfy at its callback boundaries. Swift 5 mode keeps async/await and
    # actor isolation without those errors.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"

targets:
  Stripie:
    type: application
    platform: iOS
    sources:
      - path: Stripie
    dependencies:
      - package: StripeTerminal
        product: StripeTerminal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.stripie
        CODE_SIGN_ENTITLEMENTS: Stripie/Stripie.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Stripie needs your location to accept Tap to Pay payments, as required by Stripe."
        # Stripe Terminal validates these at discovery and aborts if missing.
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Stripie uses Bluetooth to connect to card readers for Tap to Pay."
        INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: "Stripie uses Bluetooth to connect to card readers for Tap to Pay."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        # App is universal (iPhone + iPad). iPad multitasking requires all four
        # orientations declared, or App Store validation rejects the bundle.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # The app uses only standard HTTPS (TLS), which is exempt from export
        # compliance — declaring this stops App Store Connect prompting every upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # Production config baked into the Info.plist so it SHIPS in Archive/TestFlight/
        # App Store builds (scheme env vars do not). AppConfiguration reads these via
        # Bundle.main in Release; DEBUG still prefers the scheme env vars.
        INFOPLIST_KEY_StripieAPIURL: "https://www.thegoodkitchen.org"
        INFOPLIST_KEY_StripieAPIKey: "06bed4f4b5285923d6590b9f0423b1ccfdf25fe73d560925373c0d7fd7f01b6a"
        # Live Stripe publishable key (pk_live_...). Fill before shipping real charges.
        INFOPLIST_KEY_StripiePublishableKey: ""
        # `targeted` checks explicitly-concurrent code but stays lenient on the
        # un-audited Stripe Terminal SDK types. Combined with Swift 5 language
        # mode (see project-level SWIFT_VERSION), this builds cleanly.
        SWIFT_STRICT_CONCURRENCY: targeted
        # DEVELOPMENT_TEAM + CODE_SIGN_STYLE are set at the project level (inherited).
        # Tap to Pay on iPhone entitlement requires Apple approval + a provisioning
        # profile that includes com.apple.developer.proximity-reader.payment.acceptance.
        # Add the entitlement to Stripie.entitlements once your account is approved.

  StripieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StripieTests
    dependencies:
      - target: Stripie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.stripie.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Stripie:
    build:
      targets:
        Stripie: all
        StripieTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: STRIPIE_API_URL
          value: http://localhost:8000
          isEnabled: true
        - variable: STRIPE_PUBLISHABLE_KEY_TEST
          value: ""
          isEnabled: true
        - variable: STRIPIE_API_KEY
          value: 06bed4f4b5285923d6590b9f0423b1ccfdf25fe73d560925373c0d7fd7f01b6a
          isEnabled: true
    test:
      targets:
        - StripieTests
