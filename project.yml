name: Stripie
options:
  bundleIdPrefix: com.dushin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  StripeTerminal:
    url: https://github.com/stripe/stripe-terminal-ios
    minorVersion: 4.0.0

settings:
  base:
    # Swift 5 language mode. Swift 6 mode enforces `sending`/region-isolation
    # checks that the Stripe Terminal v4 SDK (not concurrency-audited) cannot
    # satisfy at its callback boundaries. Swift 5 mode keeps async/await and
    # actor isolation without those errors.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Stripie:
    type: application
    platform: iOS
    sources:
      - path: Stripie
    dependencies:
      - package: StripeTerminal
        product: StripeTerminal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.stripie
        CODE_SIGN_ENTITLEMENTS: Stripie/Stripie.entitlements
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Stripie needs your location to accept Tap to Pay payments, as required by Stripe."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        # `targeted` checks explicitly-concurrent code but stays lenient on the
        # un-audited Stripe Terminal SDK types. Combined with Swift 5 language
        # mode (see project-level SWIFT_VERSION), this builds cleanly.
        SWIFT_STRICT_CONCURRENCY: targeted
        CODE_SIGN_STYLE: Automatic
        # Tap to Pay on iPhone entitlement requires Apple approval + a provisioning
        # profile that includes com.apple.developer.proximity-reader.payment.acceptance.
        # Add the entitlement to Stripie.entitlements once your account is approved.

  StripieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StripieTests
    dependencies:
      - target: Stripie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.stripie.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Stripie:
    build:
      targets:
        Stripie: all
        StripieTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: STRIPIE_API_URL
          value: http://localhost:8000
          isEnabled: true
        - variable: STRIPE_PUBLISHABLE_KEY_TEST
          value: ""
          isEnabled: true
        - variable: STRIPIE_API_KEY
          value: NoW3s56fThFsIgd1r0s4BLccXFxGheiDdEsraymdGI4
          isEnabled: true
    test:
      targets:
        - StripieTests
