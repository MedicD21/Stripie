name: Stripie
options:
  bundleIdPrefix: com.dushin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  StripeTerminal:
    url: https://github.com/stripe/stripe-terminal-ios
    minorVersion: 4.0.0

settings:
  base:
    # Apple Developer Team. Set here (not just in the generated .pbxproj) so it
    # survives `xcodegen generate` and Xcode stops re-prompting. Inherited by all
    # targets. Required for Xcode Cloud, which signs non-interactively.
    DEVELOPMENT_TEAM: 286LKF859M
    CODE_SIGN_STYLE: Automatic
    # Swift 5 language mode. Swift 6 mode enforces `sending`/region-isolation
    # checks that the Stripe Terminal v4 SDK (not concurrency-audited) cannot
    # satisfy at its callback boundaries. Swift 5 mode keeps async/await and
    # actor isolation without those errors.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.5.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Stripie:
    type: application
    platform: iOS
    sources:
      - path: Stripie
    dependencies:
      - package: StripeTerminal
        product: StripeTerminal
    # Full Info.plist generated by XcodeGen (not Xcode's GENERATE_INFOPLIST_FILE),
    # so we can include arbitrary custom keys (StripieAPIURL etc.) alongside the
    # Apple-standard ones. These custom keys SHIP in Archive/TestFlight/App Store
    # builds; AppConfiguration reads them via Bundle.main in Release.
    info:
      path: Stripie/Info.plist
      properties:
        CFBundleDisplayName: Stripie
        # Reference the build settings so version/build stay defined in one place.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Static OS splash: solid brand-dark background so it blends seamlessly
        # into the TGK_T2P video loading screen the app shows on cold launch.
        UILaunchScreen:
          UIColorName: LaunchBackground
        # Stripe Terminal validates these at discovery and aborts (SIGABRT) if missing.
        NSLocationWhenInUseUsageDescription: "Stripie needs your location to accept Tap to Pay payments, as required by Stripe."
        NSBluetoothAlwaysUsageDescription: "Stripie uses Bluetooth to connect to card readers for Tap to Pay."
        NSBluetoothPeripheralUsageDescription: "Stripie uses Bluetooth to connect to card readers for Tap to Pay."
        # Face ID unlock (App Review requirement 1.7).
        NSFaceIDUsageDescription: "Stripie uses Face ID to quickly and securely unlock the app."
        # iPad multitasking requires all four orientations, or App Store rejects the bundle.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # HTTPS-only ⇒ exempt from export compliance; stops the per-upload prompt.
        ITSAppUsesNonExemptEncryption: false
        # Tap to Pay on iPhone requires an A12 Bionic chip (iPhone XS and later).
        # Declaring it satisfies App Review requirement 1.3 and prevents install
        # on unsupported devices.
        UIRequiredDeviceCapabilities:
          - arm64
          - iphone-ipad-minimum-performance-a12
        # Production config that SHIPS in the binary (scheme env vars do not).
        StripieAPIURL: "https://www.thegoodkitchen.org"
        # Admin login (admin-portal-auth) base URL. Same host as the API; defined
        # explicitly so it's independent of where payments are pointed.
        StripieAuthURL: "https://www.thegoodkitchen.org"
        StripieAPIKey: "06bed4f4b5285923d6590b9f0423b1ccfdf25fe73d560925373c0d7fd7f01b6a"
        # Live Stripe publishable key — used by Release/Archive builds via Info.plist.
        StripiePublishableKey: "pk_live_51SovKy1uelyqomPM8RrsLV7TJ4q1c3LyFSADTTRyjT8S31C7lNsvs3V3XDY4SrFNo0BcsYfY8epwn4gDHlWZN44B00B75XnZMz"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.stripie
        CODE_SIGN_ENTITLEMENTS: Stripie/Stripie.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # `targeted` checks explicitly-concurrent code but stays lenient on the
        # un-audited Stripe Terminal SDK types. Combined with Swift 5 language
        # mode (see project-level SWIFT_VERSION), this builds cleanly.
        SWIFT_STRICT_CONCURRENCY: targeted
        # DEVELOPMENT_TEAM + CODE_SIGN_STYLE are set at the project level (inherited).
        # Tap to Pay on iPhone entitlement requires Apple approval + a provisioning
        # profile that includes com.apple.developer.proximity-reader.payment.acceptance.
        # Add the entitlement to Stripie.entitlements once your account is approved.

  StripieTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StripieTests
    dependencies:
      - target: Stripie
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dushin.stripie.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Stripie:
    build:
      targets:
        Stripie: all
        StripieTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: STRIPIE_API_URL
          value: http://localhost:8000
          isEnabled: true
        - variable: STRIPE_PUBLISHABLE_KEY_TEST
          value: "pk_test_51SovKy1uelyqomPMSmrr5jAxHCrqIy2hdbD6rYo0sNdcwIR4X0n2p22rVKiXql3HZJ1CYJ5hFWwN3An4zQJjG9z4007dP39zlr"
          isEnabled: true
        - variable: STRIPIE_API_KEY
          value: 06bed4f4b5285923d6590b9f0423b1ccfdf25fe73d560925373c0d7fd7f01b6a
          isEnabled: true
    test:
      targets:
        - StripieTests
